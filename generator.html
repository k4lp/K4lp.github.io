<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Binaural Frequency Generator</title>
  <link rel="stylesheet" href="generator.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <h1>Frequency Generator</h1>
      <p class="subtitle">For Meditation & Focus</p>
    </header>

    <main class="generator-controls">

      <!-- Left Ear Controls -->
      <section class="channel-card" id="left-channel">
        <header class="channel-header">
          <h2>Left Ear</h2>
          <div class="volume-control">
            <label for="left-volume">Vol</label>
            <input type="range" id="left-volume" min="0" max="1" step="0.01" value="0.5">
          </div>
        </header>

        <div class="control-group">
          <label class="control-label">Waveform</label>
          <div class="wave-selector">
            <button class="wave-btn active" data-channel="left" data-wave="sine">Sine</button>
            <button class="wave-btn" data-channel="left" data-wave="square">Square</button>
            <button class="wave-btn" data-channel="left" data-wave="sawtooth">Saw</button>
            <button class="wave-btn" data-channel="left" data-wave="triangle">Tri</button>
          </div>
        </div>

        <div class="control-group">
          <label class="control-label">Frequency (Hz)</label>
          <div class="freq-input-group">
            <button class="freq-adjust-btn" id="left-freq-down">-</button>
            <input type="number" id="left-freq-input" value="432" min="20" max="20000">
            <button class="freq-adjust-btn" id="left-freq-up">+</button>
          </div>
          <input type="range" id="left-freq-slider" class="freq-slider" min="20" max="1000" step="1" value="432">
        </div>
      </section>

      <!-- Right Ear Controls -->
      <section class="channel-card" id="right-channel">
        <header class="channel-header">
          <h2>Right Ear</h2>
          <div class="volume-control">
            <label for="right-volume">Vol</label>
            <input type="range" id="right-volume" min="0" max="1" step="0.01" value="0.5">
          </div>
        </header>

        <div class="control-group">
          <label class="control-label">Waveform</label>
          <div class="wave-selector">
            <button class="wave-btn active" data-channel="right" data-wave="sine">Sine</button>
            <button class="wave-btn" data-channel="right" data-wave="square">Square</button>
            <button class="wave-btn" data-channel="right" data-wave="sawtooth">Saw</button>
            <button class="wave-btn" data-channel="right" data-wave="triangle">Tri</button>
          </div>
        </div>

        <div class="control-group">
          <label class="control-label">Frequency (Hz)</label>
          <div class="freq-input-group">
            <button class="freq-adjust-btn" id="right-freq-down">-</button>
            <input type="number" id="right-freq-input" value="440" min="20" max="20000">
            <button class="freq-adjust-btn" id="right-freq-up">+</button>
          </div>
          <input type="range" id="right-freq-slider" class="freq-slider" min="20" max="1000" step="1" value="440">
        </div>
      </section>

    </main>

    <footer class="app-footer">
      <div class="master-control">
        <button id="master-play-btn" class="play-btn">
          <span class="btn-text">Initiate Sound</span>
        </button>

        <div class="fidelity-group">
          <label class="control-label">Engine Fidelity (Sample Rate)</label>
          <div class="fidelity-selector">
            <button class="fidelity-btn active" data-rate="default" title="Standard Quality">Standard</button>
            <button class="fidelity-btn" data-rate="96000" title="High-Resolution Audio">96kHz</button>
            <button class="fidelity-btn" data-rate="192000" title="Audiophile Quality (If Supported)">192kHz</button>
          </div>
        </div>
      </div>
      <p class="warning-text">Use headphones for binaural effect. Keep volume moderate.</p>
    </footer>
  </div>

  <!-- Modular Scripts -->
  <script src="js/audio-engine.js"></script>
  <script src="js/ui-controller.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
